name: Deploy Content to law-cyberg-prod-sentinel [151148c6-4e00-4e4b-a495-445f7a5b9d0a]
# Note: This workflow will deploy everything in the root directory.
# To deploy content only from a specific path (for example SentinelContent):
#   1. Add the target path to the "paths" property like such
#    paths:
#    - 'SentinelContent/**'
#    - '!.github/workflows/**'
#    - '.github/workflows/sentinel-deploy-151148c6-4e00-4e4b-a495-445f7a5b9d0a.yml'
#   2. Append the path to the directory environment variable below
#       directory: '${{ github.workspace }}/SentinelContent'

on:
  push:
    branches: [ main ]
    paths:
    - '**'
    - '!.github/workflows/**'  # this filter prevents other workflow changes from triggering this workflow
    - '.github/workflows/sentinel-deploy-151148c6-4e00-4e4b-a495-445f7a5b9d0a.yml'

jobs:
  deploy-content:
    runs-on: windows-latest
    env:
      resourceGroupName: 'cyberg-soc-prod-rg'
      workspaceName: 'law-cyberg-prod-sentinel'
      workspaceId: 'c102dad6-9c25-4557-9a04-22f81ef2af4d'
      directory: '${{ github.workspace }}'
      cloudEnv: 'AzureCloud'
      contentTypes: 'AnalyticsRule'
      branch: 'main'
      sourceControlId: '151148c6-4e00-4e4b-a495-445f7a5b9d0a'
      rootDirectory: '${{ github.workspace }}'
      githubAuthToken: ${{ secrets.GITHUB_TOKEN }}
      smartDeployment: 'true'
    permissions:
      contents: write
      id-token: write # Require write permission to Fetch an OIDC token.

    steps:
    - name: Login to Azure (Attempt 1)
      continue-on-error: true
      id: login1
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_151148c64e004e4ba495445f7a5b9d0a }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_151148c64e004e4ba495445f7a5b9d0a }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_151148c64e004e4ba495445f7a5b9d0a }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 1 failed
      if: ${{ steps.login1.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 2)
      continue-on-error: true
      id: login2
      uses: azure/login@v2
      if: ${{ steps.login1.outcome=='failure' }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_151148c64e004e4ba495445f7a5b9d0a }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_151148c64e004e4ba495445f7a5b9d0a }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_151148c64e004e4ba495445f7a5b9d0a }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 2 failed
      if: ${{ steps.login2.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 3)
      continue-on-error: false
      id: login3
      uses: azure/login@v2
      if: ${{ steps.login2.outcome=='failure'  }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_151148c64e004e4ba495445f7a5b9d0a }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_151148c64e004e4ba495445f7a5b9d0a }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_151148c64e004e4ba495445f7a5b9d0a }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Checkout
      uses: actions/checkout@v3

    - name: Deploy Content to Microsoft Sentinel
      uses: azure/powershell@v2
      with:
        azPSVersion: 'latest'
        inlineScript: |
          ${{ github.workspace }}//.github/workflows/azure-sentinel-deploy-151148c6-4e00-4e4b-a495-445f7a5b9d0a.ps1